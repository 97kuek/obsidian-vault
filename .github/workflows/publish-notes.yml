name: Publish approved notes

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out vault
        uses: actions/checkout@v4

      - name: Check out pinned Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: d25a6eabf96751ffca56f8a8139272def7a65041
          path: .quartz

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .quartz/package-lock.json

      - name: Install Quartz
        working-directory: .quartz
        run: |
          npm ci
          npm update
          npm audit --audit-level=high

      - name: Export approved notes
        run: node tools/export-public-notes.mjs --output .quartz/content

      - name: Apply site configuration
        run: |
          cp site/quartz.config.ts .quartz/quartz.config.ts
          cp site/quartz.layout.ts .quartz/quartz.layout.ts

      - name: Build site
        working-directory: .quartz
        run: npx quartz build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .quartz/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
